<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PalCord Dashboard</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --bg-2: #1a1a2e;
      --card: rgba(22, 33, 62, 0.75);
      --accent: #5865f2;
      --accent-2: #57f287;
      --text: #ffffff;
      --muted: #a0a0a0;
      --border: rgba(255,255,255,0.1);
      --shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background: linear-gradient(-45deg, #0f0f1a, #1a1a2e, #16213e, #0f3460);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    header {
      background: rgba(15, 15, 35, 0.8);
      backdrop-filter: blur(12px);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em; }
    header h1 span { color: var(--accent-2); }
    .user { display: flex; align-items: center; gap: 1rem; }
    .user img { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--border); }
    .logout {
      color: var(--muted);
      text-decoration: none;
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      transition: all 0.2s;
    }
    .logout:hover { background: rgba(237, 66, 69, 0.15); color: #ed4245; }
    .lang-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.35rem 0.75rem;
      margin-left: 0.5rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }
    .lang-btn:hover { background: rgba(88, 101, 242, 0.2); }
    .lang-btn.active { background: var(--accent); border-color: var(--accent); }
    .main { display: flex; min-height: calc(100vh - 70px); }
    .sidebar {
      width: 300px;
      background: rgba(15, 15, 35, 0.6);
      backdrop-filter: blur(12px);
      padding: 1.5rem;
      border-right: 1px solid var(--border);
    }
    .sidebar h2 { font-size: 0.85rem; color: var(--muted); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .guild-list { list-style: none; }
    .guild-list li {
      padding: 0.85rem;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: 0.5rem;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .guild-list li:hover { background: rgba(88, 101, 242, 0.1); border-color: rgba(88, 101, 242, 0.2); }
    .guild-list li.active { background: rgba(88, 101, 242, 0.2); border-color: rgba(88, 101, 242, 0.4); }
    .guild-list img { width: 38px; height: 38px; border-radius: 50%; }
    .content {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
    }
    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }
    .section h3 { margin-bottom: 1.25rem; color: var(--accent-2); font-size: 1.2rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.25rem; }
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      padding: 1.25rem;
      border-radius: 12px;
      transition: all 0.3s;
    }
    .card:hover { transform: translateY(-3px); border-color: rgba(88, 101, 242, 0.3); }
    .card label { display: block; color: var(--muted); font-size: 0.85rem; margin-bottom: 0.4rem; }
    .card .value { font-size: 1.5rem; font-weight: 700; color: var(--text); }
    .card .icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { text-align: left; padding: 0.85rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; font-size: 0.85rem; text-transform: uppercase; }
    tr:hover { background: rgba(255,255,255,0.02); }
    input, select, textarea {
      width: 100%;
      padding: 0.75rem;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      margin-bottom: 0.85rem;
      transition: all 0.2s;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88, 101, 242, 0.15);
    }
    select option { background: var(--bg-2); color: var(--text); }
    .btn {
      background: linear-gradient(135deg, var(--accent) 0%, #4752c4 100%);
      color: #fff;
      padding: 0.7rem 1.4rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4); }
    .btn-danger { background: linear-gradient(135deg, #ed4245 0%, #c03537 100%); }
    .btn-danger:hover { box-shadow: 0 4px 15px rgba(237, 66, 69, 0.4); }
    .btn-success { background: linear-gradient(135deg, var(--accent-2) 0%, #4ad97a 100%); color: #1a1a2e; }
    .badge { display: inline-block; padding: 0.35rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    .badge-admin { background: var(--accent-2); color: #1a1a2e; }
    .badge-user { background: rgba(255,255,255,0.1); color: var(--text); }
    .hidden { display: none !important; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab {
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      color: var(--muted);
      border-radius: 20px;
      transition: all 0.2s;
      border: 1px solid transparent;
      font-weight: 500;
    }
    .tab:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .tab.active { color: var(--text); background: rgba(88, 101, 242, 0.2); border-color: rgba(88, 101, 242, 0.4); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .status-badge { display: inline-flex; align-items: center; gap: 0.4rem; font-weight: 600; }
    .status-online { color: var(--accent-2); }
    .status-offline { color: #ed4245; }
    .empty-state { text-align: center; color: var(--muted); padding: 2rem; }
    @media (max-width: 900px) { .main { flex-direction: column; } .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); } }
  </style>
</head>
<body>
  <header>
    <h1>Pal<span>Cord</span> Dashboard</h1>
    <div class="user">
      <span id="user-name"></span>
      <button class="lang-btn" data-lang="de" onclick="setLang('de')">DE</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      <img id="user-avatar" src="" alt="Avatar">
      <a href="/logout" class="logout" id="logout-link">Logout</a>
    </div>
  </header>
  <div class="main">
    <aside class="sidebar">
      <h2 id="sidebar-title">Deine Discord Server</h2>
      <ul class="guild-list" id="guild-list"></ul>
    </aside>
    <main class="content" id="content">
      <div class="section">
        <h3 id="welcome-title">Willkommen</h3>
        <p id="welcome-text">Wähle einen Discord-Server aus der linken Seite, um Palworld-Server, Shop und Einstellungen zu verwalten.</p>
      </div>
    </main>
  </div>
  <footer style="position:fixed;bottom:0;left:0;right:0;text-align:center;padding:0.6rem;background:rgba(15,15,35,0.8);backdrop-filter:blur(10px);color:var(--muted);font-size:0.8rem;z-index:100;border-top:1px solid var(--border);">
    PalCord &copy; 2026 RL-Dev.de &bull;
    <a href="/terms" id="footer-terms" style="color:var(--muted);text-decoration:none;">Nutzungsbedingungen</a> &bull;
    <a href="/privacy" id="footer-privacy" style="color:var(--muted);text-decoration:none;">Datenschutz</a>
  </footer>

  <script src="/static/i18n-frontend.js"></script>
  <script>
    let currentUser = null;
    let currentGuild = null;
    let currentGuildData = null;
    let activeTab = 'server';

    async function loadMe() {
      const res = await fetch('/api/me');
      const data = await res.json();
      currentUser = data.user;
      document.getElementById('user-name').textContent = data.user.username;
      const avatar = data.user.avatar
        ? `https://cdn.discordapp.com/avatars/${data.user.id}/${data.user.avatar}.png`
        : 'https://cdn.discordapp.com/embed/avatars/0.png';
      document.getElementById('user-avatar').src = avatar;
    }

    async function loadGuilds() {
      const res = await fetch('/api/guilds');
      const guilds = await res.json();
      const list = document.getElementById('guild-list');
      list.innerHTML = '';
      if (guilds.length === 0) {
        list.innerHTML = `<li style="cursor:default;color:#a0a0a0;">${T('no_servers_found')}</li>`;
        return;
      }
      for (const g of guilds) {
        const li = document.createElement('li');
        li.dataset.id = g.id;
        const icon = g.icon
          ? `https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png`
          : 'https://cdn.discordapp.com/embed/avatars/0.png';
        const status = g.botPresent
          ? ''
          : `<span style="color:#ed4245;margin-left:auto;font-size:0.75rem;">${T('bot_missing')}</span>`;
        li.style.opacity = g.botPresent ? '1' : '0.5';
        li.style.cursor = g.botPresent ? 'pointer' : 'default';
        li.innerHTML = `<img src="${icon}" alt=""><span>${escapeHtml(g.name)}</span>${status}`;
        if (g.botPresent) {
          li.onclick = () => selectGuild(g.id);
        } else {
          li.onclick = () => {
            const content = document.getElementById('content');
            content.innerHTML = `
              <div class="section">
                <h3>${T('bot_missing')} ${escapeHtml(g.name)}</h3>
                <p>${T('bot_invite_text')}</p>
                <a href="${g.inviteUrl}" target="_blank" class="btn">${T('bot_invite')}</a>
              </div>
            `;
          };
        }
        list.appendChild(li);
      }
    }

    async function selectGuild(guildId) {
      document.querySelectorAll('.guild-list li').forEach(li => li.classList.remove('active'));
      const active = document.querySelector(`.guild-list li[data-id="${guildId}"]`);
      if (active) active.classList.add('active');
      currentGuild = guildId;

      // ensure guild is registered in db
      await fetch(`/api/guilds/${guildId}/register`, { method: 'POST' });

      const res = await fetch(`/api/guilds/${guildId}`);
      currentGuildData = await res.json();
      renderTabs();
      renderContent();
    }

    function renderTabs() {
      if (!currentGuildData.isAdmin) {
        if (!['status', 'bases'].includes(activeTab)) activeTab = 'status';
      }
    }

    function renderContent() {
      const c = document.getElementById('content');
      const isAdmin = currentGuildData.isAdmin;
      const tabs = isAdmin ? `
        <div class="tabs">
          <div class="tab ${activeTab === 'server' ? 'active' : ''}" onclick="activeTab='server';renderContent();">${T('server')}</div>
          <div class="tab ${activeTab === 'status' ? 'active' : ''}" onclick="activeTab='status';renderContent();">${T('status')}</div>
          <div class="tab ${activeTab === 'shop' ? 'active' : ''}" onclick="activeTab='shop';renderContent();">${T('shop')}</div>
          <div class="tab ${activeTab === 'players' ? 'active' : ''}" onclick="activeTab='players';renderContent();">${T('players')}</div>
          <div class="tab ${activeTab === 'bases' ? 'active' : ''}" onclick="activeTab='bases';renderContent();">${T('bases')}</div>
          <div class="tab ${activeTab === 'users' ? 'active' : ''}" onclick="activeTab='users';renderContent();">${T('users')}</div>
          <div class="tab ${activeTab === 'admin' ? 'active' : ''}" onclick="activeTab='admin';renderContent();">${T('admin')}</div>
          <div class="tab ${activeTab === 'settings' ? 'active' : ''}" onclick="activeTab='settings';renderContent();">${T('settings')}</div>
        </div>
      ` : `
        <div class="tabs">
          <div class="tab ${activeTab === 'status' ? 'active' : ''}" onclick="activeTab='status';renderContent();">${T('status')}</div>
          <div class="tab ${activeTab === 'bases' ? 'active' : ''}" onclick="activeTab='bases';renderContent();">${T('bases')}</div>
        </div>
      `;

      if (!isAdmin && activeTab === 'status') {
        c.innerHTML = tabs + statusView();
        loadStatus();
        return;
      }

      if (!isAdmin && activeTab === 'bases') {
        c.innerHTML = tabs + basesView();
        loadBases();
        return;
      }
      let view = '';
      if (activeTab === 'server') view = serversView();
      else if (activeTab === 'status') view = statusView();
      else if (activeTab === 'shop') view = shopView();
      else if (activeTab === 'players') view = playersView();
      else if (activeTab === 'bases') view = basesView();
      else if (activeTab === 'users') view = usersView();
      else if (activeTab === 'admin') view = adminView();
      else if (activeTab === 'settings') view = settingsView();
      c.innerHTML = tabs + view;

      if (activeTab === 'server') loadServers();
      else if (activeTab === 'status') loadStatus();
      else if (activeTab === 'shop') loadShop();
      else if (activeTab === 'players') loadPlayers();
      else if (activeTab === 'bases') loadBases();
      else if (activeTab === 'users') loadUsers();
      else if (activeTab === 'admin') loadAdmin();
      else if (activeTab === 'settings') loadSettings();
    }

    function serversView() {
      return `
        <div class="section">
          <h3>${T('add_server')}</h3>
          <form id="server-form">
            <div class="form-row">
              <input type="text" id="s-name" placeholder="${T('server_name')}" required>
              <input type="text" id="s-ip" placeholder="${T('server_ip_port')}" required>
            </div>
            <div class="form-row">
              <input type="text" id="s-rcon-host" placeholder="${T('rcon_host')}" required>
              <input type="number" id="s-rcon-port" placeholder="${T('rcon_port')}" value="25575" required>
            </div>
            <input type="text" id="s-rcon-password" placeholder="${T('rcon_password')}" required>
            <div class="form-row">
              <input type="text" id="s-rest-api-host" placeholder="${T('rest_api_host')}">
              <input type="number" id="s-rest-api-port" placeholder="${T('rest_api_port')}" value="8212">
            </div>
            <input type="text" id="s-rest-api-user" placeholder="${T('rest_api_username')}" value="admin">
            <div class="form-row">
              <input type="number" id="s-max-players" placeholder="${T('max_players')}" value="32">
              <input type="text" id="s-emblem" placeholder="${T('emblem_url')}">
            </div>
            <input type="text" id="s-info-url" placeholder="${T('info_url')}">
            <textarea id="s-description" placeholder="${T('description')}" rows="2"></textarea>
            <button type="submit" class="btn">${T('add')}</button>
          </form>
        </div>
        <div class="section">
          <h3>${T('settings')}</h3>
          <form id="server-config-form">
            <div class="form-row">
              <input type="number" id="s-max-bases" placeholder="${T('max_bases')}" value="5" min="1" max="50">
            </div>
            <button type="submit" class="btn">${T('save')}</button>
          </form>
        </div>
        <div class="section">
          <h3>${T('scheduled_broadcasts')}</h3>
          <form id="broadcast-form">
            <input type="text" id="broadcast-message" placeholder="${T('broadcast_message')}" required>
            <div class="form-row" style="align-items:center;">
              <label style="display:flex;align-items:center;gap:0.5rem;color:#a0a0a0;"><input type="checkbox" id="broadcast-recurring" style="width:auto;margin:0;"> ${T('daily')}</label>
            </div>
            <input type="datetime-local" id="broadcast-time" required>
            <input type="time" id="broadcast-daily-time" placeholder="${T('time')}" style="display:none;">
            <button type="submit" class="btn">${T('add_broadcast')}</button>
          </form>
        </div>
        <div class="section">
          <h3>${T('scheduled_broadcasts')}</h3>
          <table id="broadcasts-table"><thead><tr><th>${T('broadcast_message')}</th><th>${T('broadcast_time')}</th><th>${T('recurring')}</th><th>${T('status')}</th><th>${T('action')}</th></tr></thead><tbody></tbody></table>
        </div>
        <div class="section">
          <h3>${T('server')}</h3>
          <div id="server-list"></div>
        </div>
      `;
    }

    async function loadServers() {
      const [serversRes, configRes, broadcastsRes] = await Promise.all([
        fetch(`/api/guilds/${currentGuild}/servers`),
        fetch(`/api/guilds/${currentGuild}/config`),
        fetch(`/api/guilds/${currentGuild}/broadcasts`),
      ]);
      const servers = await serversRes.json();
      const config = await configRes.json();
      const broadcasts = await broadcastsRes.json();
      const div = document.getElementById('server-list');

      const maxBasesInput = document.getElementById('s-max-bases');
      if (maxBasesInput) maxBasesInput.value = config.max_bases || 5;

      const bTbody = document.querySelector('#broadcasts-table tbody');
      if (bTbody) {
        bTbody.innerHTML = broadcasts.map(b => {
          const timeInfo = b.recurring ? `${T('recurring_daily')} ${b.time || '-'}` : new Date(b.run_at).toLocaleString();
          return `
          <tr>
            <td>${escapeHtml(b.message)}</td>
            <td>${timeInfo}</td>
            <td>${b.recurring ? '✅' : ''}</td>
            <td>${b.recurring ? '♻️' : (b.sent ? '✅' : '⏳')}</td>
            <td><button class="btn btn-danger" onclick="deleteBroadcast(${b.id})">${T('delete')}</button></td>
          </tr>
        `}).join('');
        if (broadcasts.length === 0) bTbody.innerHTML = `<tr><td colspan="5">${T('no_broadcasts')}</td></tr>`;
      }
      if (servers.length === 0) {
        div.innerHTML = `<p>${T('no_servers')}</p>`;
      } else {
        div.innerHTML = servers.map(s => `
          <div class="card" style="margin-bottom:1rem;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div>
                <strong>${escapeHtml(s.name)}</strong> ${s.is_active ? `<span class="badge badge-admin">${T('active')}</span>` : ''}
                <div style="color:#a0a0a0;font-size:0.85rem;">${s.server_ip} | RCON ${s.rcon_host}:${s.rcon_port}</div>
              </div>
              <div>
                ${!s.is_active ? `<button class="btn btn-success" onclick="activateServer(${s.id})">${T('active')}</button>` : ''}
                <button class="btn btn-danger" onclick="deleteServer(${s.id})">${T('delete')}</button>
              </div>
            </div>
          </div>
        `).join('');
      }

      const form = document.getElementById('server-form');
      const oldForm = form.cloneNode(true);
      form.parentNode.replaceChild(oldForm, form);
      oldForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!currentGuild) {
          alert('Kein Discord-Server ausgewählt.');
          return;
        }
        const submitBtn = oldForm.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Speichern...';
        const body = {
          name: document.getElementById('s-name').value,
          server_ip: document.getElementById('s-ip').value,
          rcon_host: document.getElementById('s-rcon-host').value,
          rcon_port: parseInt(document.getElementById('s-rcon-port').value),
          rcon_password: document.getElementById('s-rcon-password').value,
          rest_api_host: document.getElementById('s-rest-api-host').value || null,
          rest_api_port: parseInt(document.getElementById('s-rest-api-port').value),
          rest_api_username: document.getElementById('s-rest-api-user').value,
          max_players: parseInt(document.getElementById('s-max-players').value),
          emblem_url: document.getElementById('s-emblem').value,
          info_url: document.getElementById('s-info-url').value,
          description: document.getElementById('s-description').value,
        };
        try {
          const res = await fetch(`/api/guilds/${currentGuild}/servers`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          const data = await res.json();
          if (!res.ok) {
            alert(`${T('error')}: ${data.error || T('server_create_failed')}`);
          } else {
            oldForm.reset();
            alert(T('server_created'));
            renderContent();
          }
        } catch (err) {
          alert(`Netzwerkfehler: ${err.message}`);
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Hinzufügen';
        }
      });

      const configForm = document.getElementById('server-config-form');
      if (configForm) {
        configForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const res = await fetch(`/api/guilds/${currentGuild}/config`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ max_bases: parseInt(document.getElementById('s-max-bases').value) }),
          });
          if (res.ok) {
            alert(T('success'));
          } else {
            const data = await res.json();
            alert(`${T('error')}: ${data.error || 'Fehler'}`);
          }
        });
      }

      const broadcastForm = document.getElementById('broadcast-form');
      if (broadcastForm) {
        const recurringCheckbox = document.getElementById('broadcast-recurring');
        const runAtInput = document.getElementById('broadcast-time');
        const dailyTimeInput = document.getElementById('broadcast-daily-time');
        const toggleFields = () => {
          const recurring = recurringCheckbox.checked;
          runAtInput.style.display = recurring ? 'none' : 'block';
          runAtInput.required = !recurring;
          dailyTimeInput.style.display = recurring ? 'block' : 'none';
          dailyTimeInput.required = recurring;
        };
        recurringCheckbox.addEventListener('change', toggleFields);
        toggleFields();
        broadcastForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const recurring = recurringCheckbox.checked;
          const runAt = runAtInput.value;
          const dailyTime = dailyTimeInput.value;
          const now = new Date();
          let body;
          if (recurring) {
            if (!dailyTime) return;
            const [hour, minute] = dailyTime.split(':');
            const runAtDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hour, minute, 0);
            body = {
              message: document.getElementById('broadcast-message').value,
              run_at: runAtDate.toISOString(),
              recurring: true,
              time: dailyTime,
            };
          } else {
            if (!runAt) return;
            body = {
              message: document.getElementById('broadcast-message').value,
              run_at: new Date(runAt).toISOString(),
              recurring: false,
              time: null,
            };
          }
          const res = await fetch(`/api/guilds/${currentGuild}/broadcasts`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (res.ok) {
            broadcastForm.reset();
            recurringCheckbox.checked = false;
            toggleFields();
            renderContent();
          } else {
            const data = await res.json();
            alert(`${T('error')}: ${data.error || 'Fehler'}`);
          }
        });
      }
    }

    async function loadShop() {
      const res = await fetch(`/api/guilds/${currentGuild}/shop`);
      const items = await res.json();
      const tbody = document.querySelector('#shop-table tbody');
      if (!tbody) return;
      tbody.innerHTML = items.map(i => `
        <tr>
          <td>${escapeHtml(i.name || i.item_id)}</td>
          <td>${i.item_type}</td>
          <td>${i.price}</td>
          <td>${i.level || i.amount}</td>
          <td><button class="btn btn-danger" onclick="deleteShopItem(${i.id})">${T('delete')}</button></td>
        </tr>
      `).join('');
      if (items.length === 0) tbody.innerHTML = `<tr><td colspan="5">${T('no_shop_items')}</td></tr>`;

      const [itemsRes, palsRes] = await Promise.all([fetch('/api/items'), fetch('/api/pals')]);
      const allItems = await itemsRes.json();
      const allPals = await palsRes.json();

      function populateItemDropdown() {
        const itemSelect = document.getElementById('shop-item-id');
        const eggSelect = document.getElementById('shop-egg-id');
        const typeSelect = document.getElementById('shop-type');
        const wrapper = document.getElementById('shop-item-select-wrapper');
        const textInput = document.getElementById('shop-item-id-text');
        const type = typeSelect.value;
        itemSelect.innerHTML = '';
        eggSelect.innerHTML = '<option value="">Egg wählen (optional)</option>';
        if (type === 'item') {
          allItems.forEach(i => {
            const opt = document.createElement('option');
            opt.value = i.id;
            opt.textContent = `${i.name} (${i.id})`;
            itemSelect.appendChild(opt);
          });
        } else if (type === 'pal' || type === 'egg') {
          allPals.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = `${p.name} (${p.id})`;
            itemSelect.appendChild(opt);
            if (type === 'egg') {
              const eggOpt = document.createElement('option');
              eggOpt.value = p.id;
              eggOpt.textContent = p.name;
              eggSelect.appendChild(eggOpt);
            }
          });
        }
        const needsDropdown = ['item', 'pal', 'egg'].includes(type);
        wrapper.style.display = needsDropdown ? 'block' : 'none';
        textInput.style.display = needsDropdown ? 'none' : 'block';
        textInput.disabled = needsDropdown;
        itemSelect.required = needsDropdown;
        textInput.required = !needsDropdown;
        document.querySelector('.egg-row').style.display = type === 'egg' ? 'flex' : 'none';
      }

      populateItemDropdown();
      document.getElementById('shop-type').addEventListener('change', populateItemDropdown);

      document.getElementById('shop-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const type = document.getElementById('shop-type').value;
        const needsDropdown = ['item', 'pal', 'egg'].includes(type);
        const body = {
          item_type: type,
          item_id: needsDropdown ? document.getElementById('shop-item-id').value : document.getElementById('shop-item-id-text').value,
          price: parseInt(document.getElementById('shop-price').value),
          amount: parseInt(document.getElementById('shop-amount').value),
          level: parseInt(document.getElementById('shop-amount').value),
          egg_id: type === 'egg' ? document.getElementById('shop-egg-id').value || null : null,
        };
        const res = await fetch(`/api/guilds/${currentGuild}/shop`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (res.ok) {
          e.target.reset();
          populateItemDropdown();
          renderContent();
        } else {
          const data = await res.json();
          alert(`Fehler: ${data.error || 'Shop-Item konnte nicht hinzugefügt werden.'}`);
        }
      });
    }

        playersRes.then(r => r.json()),
        fetch(`/api/guilds/${currentGuild}/bases`).then(r => r.json()),
        configRes.then(r => r.json()),
      ]);
      const maxBases = config.max_bases ? parseInt(config.max_bases, 10) : 5;

      const playerRow = document.getElementById('base-player-row');
      if (playerRow && !isAdmin) {
        playerRow.style.display = 'none';
        document.getElementById('base-player').required = false;
      }

      const playerSelect = document.getElementById('base-player');
      if (playerSelect && isAdmin) {
        playerSelect.innerHTML = `<option value="">${T('choose_player')}</option>` +
          players.map(p => `<option value="${p.user_id}">${escapeHtml(p.ingame_name || p.user_id)}</option>`).join('');
      }

      const editSelect = document.getElementById('base-edit-select');
      if (editSelect) {
        editSelect.innerHTML = `<option value="">${T('choose_base')}</option>` +
          bases.map(b => `<option value="${b.id}" data-base='${JSON.stringify(b).replace(/'/g, "&#39;")}'>${escapeHtml(b.name)} (${b.x}, ${b.y})</option>`).join('');
        editSelect.addEventListener('change', () => {
          const opt = editSelect.selectedOptions[0];
          const data = opt.dataset.base ? JSON.parse(opt.dataset.base) : null;
          if (data) {
            document.getElementById('base-edit-name').value = data.name;
            document.getElementById('base-edit-x').value = data.x;
            document.getElementById('base-edit-y').value = data.y;
            document.getElementById('base-edit-z').value = data.z !== null ? data.z : '';
            document.getElementById('base-edit-description').value = data.description || '';
            document.getElementById('base-edit-main').checked = !!data.is_main;
          }
        });
      }

      const limitInfo = document.getElementById('bases-limit-info');
      if (limitInfo) {
        limitInfo.textContent = isAdmin ? `${T('max_bases')}: ${maxBases}` : `${bases.length}/${maxBases} ${T('bases').toLowerCase()} ${T('per_user')}`;
      }

      const tbody = document.querySelector('#bases-table tbody');
      if (tbody) {
        tbody.innerHTML = bases.map(b => `
          <tr>
            <td>${escapeHtml(b.ingame_name || b.user_id)}</td>
            <td>${escapeHtml(b.name)}</td>
            <td>${b.x}</td>
            <td>${b.y}</td>
            <td>${b.z !== null ? b.z : '-'}</td>
            <td>${escapeHtml(b.description || '')}</td>
            <td>${b.is_main ? '✅' : ''}</td>
            <td><button class="btn btn-danger" onclick="deleteBase(${b.id})">${T('delete')}</button></td>
          </tr>
        `).join('');
        if (bases.length === 0) tbody.innerHTML = `<tr><td colspan="8">${T('no_bases')}</td></tr>`;
      }

      const form = document.getElementById('base-form');
      if (form) {
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          const body = {
            user_id: isAdmin ? document.getElementById('base-player').value : undefined,
            name: document.getElementById('base-name').value,
            x: parseFloat(document.getElementById('base-x').value),
            y: parseFloat(document.getElementById('base-y').value),
            z: document.getElementById('base-z').value ? parseFloat(document.getElementById('base-z').value) : null,
            description: document.getElementById('base-description').value || null,
            is_main: document.getElementById('base-main').checked,
          };
          const res = await fetch(`/api/guilds/${currentGuild}/bases`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (res.ok) {
            form.reset();
            renderContent();
          } else {
            const data = await res.json();
            alert(`${T('error')}: ${data.error || 'Fehler'}`);
          }
        });
      }

      const editForm = document.getElementById('base-edit-form');
      if (editForm) {
        editForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const id = parseInt(document.getElementById('base-edit-select').value);
          if (!id) return;
          const body = {
            name: document.getElementById('base-edit-name').value,
            x: parseFloat(document.getElementById('base-edit-x').value),
            y: parseFloat(document.getElementById('base-edit-y').value),
            z: document.getElementById('base-edit-z').value ? parseFloat(document.getElementById('base-edit-z').value) : null,
            description: document.getElementById('base-edit-description').value || null,
            is_main: document.getElementById('base-edit-main').checked,
          };
          const res = await fetch(`/api/guilds/${currentGuild}/bases/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (res.ok) {
            editForm.reset();
            renderContent();
          } else {
            const data = await res.json();
            alert(`${T('error')}: ${data.error || 'Fehler'}`);
          }
        });
      }
    }

    async function deleteBase(id) {
      if (!confirm(`${T('delete')}?`)) return;
      await fetch(`/api/guilds/${currentGuild}/bases/${id}`, { method: 'DELETE' });
      renderContent();
    }

    async function loadUsers() {
      const res = await fetch(`/api/guilds/${currentGuild}/users`);
      const users = await res.json();
      const tbody = document.querySelector('#users-table tbody');
      if (!tbody) return;
      tbody.innerHTML = users.map(u => `
        <tr>
          <td>${u.discord_id}</td>
          <td><span class="badge ${u.role === 'admin' ? 'badge-admin' : 'badge-user'}">${u.role === 'admin' ? T('admin') : T('user')}</span></td>
          <td>
            <button class="btn" onclick="setUserRole('${u.discord_id}', '${u.role === 'admin' ? 'user' : 'admin'}')">${u.role === 'admin' ? T('user') : T('admin')}</button>
          </td>
        </tr>
      `).join('');
      if (users.length === 0) tbody.innerHTML = `<tr><td colspan="3">${T('no_users')}</td></tr>`;
    }

    async function setUserRole(discordId, role) {
      await fetch(`/api/guilds/${currentGuild}/users/${discordId}/role`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ role }),
      });
      renderContent();
    }

    function settingsView() {
      return `
        <div class="section">
          <h3>${T('settings')}</h3>
          <form id="settings-form">
            <label>${T('welcome_channel')}</label>
            <select id="welcome_channel_id"><option value="">—</option></select>
            <label>${T('auto_role')}</label>
            <select id="auto_role_id"><option value="">—</option></select>
            <label>${T('notification_channel')}</label>
            <select id="notification_channel_id"><option value="">—</option></select>
            <label>${T('daily_reminder_channel')}</label>
            <select id="daily_reminder_channel_id"><option value="">—</option></select>
            <label>${T('rules_config')}</label>
            <textarea id="rules" rows="6" placeholder="Server-Regeln..."></textarea>
            <button type="submit" class="btn">${T('save')}</button>
          </form>
        </div>
      `;
    }

    async function loadSettings() {
      const [settingsRes, channelsRes, rolesRes] = await Promise.all([
        fetch(`/api/guilds/${currentGuild}/settings`),
        fetch(`/api/guilds/${currentGuild}/channels`),
        fetch(`/api/guilds/${currentGuild}/roles`),
      ]);
      const settings = await settingsRes.json();
      const channels = await channelsRes.json();
      const roles = await rolesRes.json();

      function populateSelect(id, items, selected) {
        const select = document.getElementById(id);
        if (!select) return;
        select.innerHTML = '<option value="">—</option>' + items.map(i => `<option value="${i.id}" ${i.id === selected ? 'selected' : ''}>${escapeHtml(i.name)}</option>`).join('');
      }

      populateSelect('welcome_channel_id', channels, settings.welcome_channel_id);
      populateSelect('notification_channel_id', channels, settings.notification_channel_id);
      populateSelect('daily_reminder_channel_id', channels, settings.daily_reminder_channel_id);
      populateSelect('auto_role_id', roles, settings.auto_role_id);
      document.getElementById('rules').value = settings.rules || '';

      document.getElementById('settings-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = {
          welcome_channel_id: document.getElementById('welcome_channel_id').value,
          auto_role_id: document.getElementById('auto_role_id').value,
          notification_channel_id: document.getElementById('notification_channel_id').value,
          daily_reminder_channel_id: document.getElementById('daily_reminder_channel_id').value,
          rules: document.getElementById('rules').value.trim(),
        };
        const res = await fetch(`/api/guilds/${currentGuild}/settings`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (res.ok) {
          alert(T('settings_saved'));
        } else {
          alert(T('error'));
        }
      });
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    window.applyStaticTranslations = function() {
      document.getElementById('sidebar-title').textContent = T('your_discord_servers');
      document.getElementById('welcome-title').textContent = T('welcome');
      document.getElementById('welcome-text').textContent = T('select_server_hint');
      document.getElementById('logout-link').textContent = T('logout');
      document.getElementById('footer-terms').textContent = T('terms_title');
      document.getElementById('footer-privacy').textContent = T('privacy_title');
      document.title = `${T('app_name')} ${T('dashboard')}`;
    };

    async function init() {
      await loadMe();
      await loadGuilds();
    }

    init();
  </script>
</body>
</html>
