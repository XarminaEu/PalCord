<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PalCord Public Servers</title>
  <link rel="icon" type="image/png" href="/static/PalCord_logo_echt_transparent.png">
  <style>
    :root {
      --bg-1: #0f0f23;
      --bg-2: #1a1a2e;
      --bg-3: #252542;
      --text: #f0f0f5;
      --muted: #a0a0b0;
      --accent: #5865f2;
      --accent-2: #57f287;
      --border: rgba(255,255,255,0.1);
      --shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, var(--bg-1) 0%, #16213e 100%);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: rgba(15,15,35,0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    header h1 { margin: 0; font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
    header h1 span { color: var(--accent); }
    .header-logo { height: 32px; }
    .header-actions { display: flex; gap: 1rem; align-items: center; }
    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:hover { background: #4752c4; }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: var(--text);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.2); }
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .section {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
    }
    .guild-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
    .guild-card {
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.2rem;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
    }
    .guild-card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .guild-card h3 { margin: 0 0 0.5rem; }
    .guild-card p { margin: 0; color: var(--muted); font-size: 0.9rem; }
    .bumps { float: right; background: rgba(88,101,242,0.2); padding: 0.3rem 0.6rem; border-radius: 20px; font-size: 0.85rem; }
    .server-info { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .info-box { background: var(--bg-3); padding: 1rem; border-radius: 8px; }
    .info-box h4 { margin: 0 0 0.5rem; color: var(--accent); }
    .status-online { color: var(--accent-2); }
    .status-offline { color: #ed4245; }
    .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .shop-item { background: var(--bg-3); padding: 1rem; border-radius: 8px; }
    .shop-item h4 { margin: 0 0 0.5rem; }
    .shop-item p { margin: 0; color: var(--muted); font-size: 0.85rem; }
    .rules { white-space: pre-wrap; line-height: 1.6; }
    .bump-bar { display: flex; justify-content: space-between; align-items: center; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <h1><img src="/static/PalCord_logo_echt_transparent.png" class="header-logo" alt="PalCord Logo"> Pal<span>Cord</span> Public</h1>
    <div class="header-actions">
      <a href="/" class="btn btn-secondary">Dashboard Login</a>
      <button class="btn" data-lang="de" onclick="setLang('de')">DE</button>
      <button class="btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
  </header>
  <div class="container" id="app">
    <div id="list-view" class="section">
      <h2 id="list-title">Public Discord Servers</h2>
      <div class="guild-list" id="guild-list"></div>
    </div>
    <div id="detail-view" class="hidden">
      <div class="section bump-bar">
        <div>
          <h2 id="detail-name"></h2>
          <p id="detail-bumps" style="color: var(--muted);"></p>
        </div>
        <button class="btn" id="bump-btn" onclick="bumpGuild()">Bump Server</button>
      </div>
      <div class="section">
        <h3>Server Status</h3>
        <div id="detail-status" class="server-info"></div>
      </div>
      <div class="section">
        <h3>Shop</h3>
        <div id="detail-shop" class="shop-grid"></div>
      </div>
      <div class="section">
        <h3>Rules</h3>
        <div id="detail-rules" class="rules"></div>
      </div>
      <button class="btn btn-secondary" onclick="showList()">Back to list</button>
    </div>
  </div>
  <script>
    let currentGuildId = null;
    let currentLang = 'de';
    let translations = {};

    function T(key, fallback) {
      return translations[key] || fallback || key;
    }

    async function loadLang() {
      const saved = document.cookie.split('; ').find(r => r.startsWith('lang='));
      currentLang = saved ? saved.split('=')[1] : (navigator.language.startsWith('en') ? 'en' : 'de');
      const res = await fetch('/api/lang');
      const data = await res.json();
      currentLang = data.lang;
      translations = data.translations;
      document.documentElement.lang = currentLang;
      applyTranslations();
    }

    function setLang(lang) {
      currentLang = lang;
      document.cookie = `lang=${lang};path=/;max-age=31536000`;
      fetch('/api/lang', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ lang }) });
      loadLang().then(() => {
        if (currentGuildId) loadDetail(currentGuildId);
        else loadGuilds();
      });
    }

    function applyTranslations() {
      document.getElementById('list-title').textContent = T('public_servers', 'Public Discord Servers');
      document.getElementById('bump-btn').textContent = T('bump_server', 'Bump Server');
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.toString().replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    }

    async function loadGuilds() {
      const res = await fetch('/api/public/guilds');
      const guilds = await res.json();
      const list = document.getElementById('guild-list');
      list.innerHTML = guilds.map(g => `
        <div class="guild-card" onclick="loadDetail('${g.id}')">
          <span class="bumps">${g.bumps || 0} Bumps</span>
          <h3>${escapeHtml(g.name)}</h3>
          <p>${T('public_owner', 'Owner')}: ${g.owner_id || '-'}</p>
        </div>
      `).join('') || `<p>${T('no_public_servers', 'No public servers yet.')}</p>`;
      document.getElementById('list-view').classList.remove('hidden');
      document.getElementById('detail-view').classList.add('hidden');
      currentGuildId = null;
    }

    async function loadDetail(guildId) {
      currentGuildId = guildId;
      const [guildRes, shopRes, rulesRes, statusRes] = await Promise.all([
        fetch(`/api/public/guilds/${guildId}`),
        fetch(`/api/public/guilds/${guildId}/shop`),
        fetch(`/api/public/guilds/${guildId}/rules`),
        fetch(`/api/public/guilds/${guildId}/status`).catch(() => ({ json: async () => ({ error: true }) })),
      ]);
      const guild = await guildRes.json();
      if (guild.error) return loadGuilds();
      const shop = await shopRes.json();
      const rules = await rulesRes.json();
      let status = { error: true };
      try { status = await statusRes.json(); } catch (e) {}

      document.getElementById('detail-name').textContent = escapeHtml(guild.name);
      document.getElementById('detail-bumps').textContent = `${guild.bumps || 0} ${T('bumps', 'Bumps')}`;
      document.getElementById('detail-rules').textContent = rules.rules || T('no_rules', 'No rules configured.');

      const statusBox = document.getElementById('detail-status');
      if (status.error || !status.online) {
        statusBox.innerHTML = `<div class="info-box"><h4>Status</h4><p class="status-offline">${T('offline', 'Offline')}</p></div>`;
      } else {
        statusBox.innerHTML = `
          <div class="info-box"><h4>${T('status', 'Status')}</h4><p class="status-online">${T('online', 'Online')}</p></div>
          <div class="info-box"><h4>${T('players', 'Players')}</h4><p>${status.players || 0} / ${status.maxPlayers || '-'}</p></div>
          <div class="info-box"><h4>${T('server_name', 'Server Name')}</h4><p>${escapeHtml(status.name || '-')}</p></div>
          <div class="info-box"><h4>${T('server_ip', 'Server IP')}</h4><p>${escapeHtml(status.serverIp || '-')}</p></div>
        `;
      }

      const shopBox = document.getElementById('detail-shop');
      shopBox.innerHTML = (shop || []).map(item => `
        <div class="shop-item">
          <h4>${escapeHtml(item.name || item.item_id)}</h4>
          <p>${item.price} Coins</p>
          <p>${item.item_type} ${item.level ? `(Lvl ${item.level})` : ''}</p>
        </div>
      `).join('') || `<p>${T('no_shop_items', 'No shop items available.')}</p>`;

      document.getElementById('list-view').classList.add('hidden');
      document.getElementById('detail-view').classList.remove('hidden');
    }

    async function bumpGuild() {
      if (!currentGuildId) return;
      const res = await fetch(`/api/public/guilds/${currentGuildId}/bump`, { method: 'POST' });
      const data = await res.json();
      if (data.ok) {
        document.getElementById('detail-bumps').textContent = `${data.bumps} ${T('bumps', 'Bumps')}`;
      }
    }

    function showList() {
      loadGuilds();
    }

    (async function init() {
      const match = window.location.pathname.match(/\/public\/([^/]+)/);
      await loadLang();
      if (match) await loadDetail(match[1]);
      else await loadGuilds();
    })();
  </script>
</body>
</html>
